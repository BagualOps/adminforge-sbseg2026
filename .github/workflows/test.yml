name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: unit (stdlib only)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: install (dev only)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: confirm zero runtime deps
        run: |
          pip show adminforge | grep -E '^Requires:' | tee /dev/stderr | grep -qE '^Requires:\s*$'
      - name: unit tests
        run: pytest -q

  integration:
    name: integration (docker lab)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install (dev only)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: integration tests
        env:
          ADMINFORGE_INTEGRATION: "1"
        run: pytest tests/integration/ -v
      - name: cleanup containers
        if: always()
        run: docker compose -f infra/testlab/docker-compose.yml down -v || true

  lint:
    name: lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - run: ruff check adminforge tests
      - run: mypy adminforge --ignore-missing-imports || true
